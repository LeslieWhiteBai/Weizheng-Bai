project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - research.qmd
    - publications.qmd
    - Chinese.qmd

website:
  title: "Weizheng Bai（白炜政）"
  site-url: "https://lesliewhitebai.github.io/Weizheng-Bai/"
  repo-url: "https://github.com/LeslieWhiteBai/Weizheng-Bai"
  repo-actions: [edit, issue]
  favicon: images/bio-photo.jpg
  page-navigation: true
  navbar:
    background: light
    pinned: true
    right:
      - text: Home
        href: index.qmd
      - text: Research
        href: research.qmd
      - text: Publications
        href: publications.qmd
      - text: 中文
        href: Chinese.qmd
      - text: CV
        href: CV.pdf
      - icon: github
        href: "https://github.com/LeslieWhiteBai"
        aria-label: GitHub
  page-footer:
    left: "© 2026 Weizheng Bai"
    right: "Built with [Quarto](https://quarto.org/)"

format:
  html:
    theme: styles.scss
    toc: true
    toc-depth: 2
    smooth-scroll: true
    link-external-newwindow: true

execute:
  freeze: auto